<section id="compareResearchSection" class="mt-8 hidden rounded-[1.75rem] border border-slate-700/70 bg-slate-900/60 p-6 md:p-8">
    <div class="mb-6 space-y-2">
        <p class="text-xs font-semibold tracking-[0.18em] text-slate-400 uppercase">מחקר שימוש</p>
        <h3 class="text-2xl font-bold text-white">עזרת לנו להשלים תמונת בעלות אמיתית</h3>
        <p class="text-sm leading-7 text-slate-400">
            אחרי תוצאת ההשוואה אפשר לשמור תשובות קצרות על אחד מהרכבים שנבדקו. השמירה דורשת אישור מחקר ייעודי.
        </p>
    </div>

    <form id="compareResearchForm" class="space-y-5">
        <div class="grid gap-5 md:grid-cols-2">
            <div class="space-y-2">
                <label for="compareSubjectVehicle" class="block text-sm font-semibold text-slate-200">על איזה רכב התשובות מתייחסות?</label>
                <select id="compareSubjectVehicle" class="w-full rounded-2xl border border-slate-700 bg-slate-950/70 px-4 py-3 text-sm text-white">
                    <option value="car_1">רכב 1</option>
                    <option value="car_2">רכב 2</option>
                    <option value="car_3">רכב 3</option>
                    <option value="unknown">לא בטוח / אחר</option>
                </select>
            </div>
            <div class="space-y-2">
                <label for="compareAnnualInsurance" class="block text-sm font-semibold text-slate-200">כמה משלם/ת על ביטוח בשנה? (₪)</label>
                <input id="compareAnnualInsurance" type="number" min="0" max="50000" step="50" class="w-full rounded-2xl border border-slate-700 bg-slate-950/70 px-4 py-3 text-sm text-white" placeholder="לדוגמה: 6200">
            </div>
        </div>

        <div class="grid gap-5 md:grid-cols-2">
            <div class="space-y-2">
                <label for="compareAnnualTotalCost" class="block text-sm font-semibold text-slate-200">מה העלות השנתית הכוללת? (₪)</label>
                <input id="compareAnnualTotalCost" type="number" min="0" max="200000" step="100" class="w-full rounded-2xl border border-slate-700 bg-slate-950/70 px-4 py-3 text-sm text-white" placeholder="דלק, ביטוח, טיפולים ועוד">
            </div>
            <div class="space-y-2">
                <label for="compareSatisfactionScore" class="block text-sm font-semibold text-slate-200">שביעות רצון כללית (1–10)</label>
                <input id="compareSatisfactionScore" type="range" min="1" max="10" step="1" value="8" class="w-full accent-primary">
                <div class="text-xs text-slate-400">1 = לא מרוצה, 10 = מרוצה מאוד</div>
            </div>
        </div>

        <div class="space-y-2">
            <p class="text-sm font-semibold text-slate-200">האם היית קונה/ה את הרכב הזה שוב?</p>
            <div class="flex flex-wrap gap-3 text-sm">
                <label class="inline-flex items-center gap-2 rounded-full border border-slate-700 px-4 py-2">
                    <input type="radio" name="compare_would_buy_again" value="true" class="text-primary" checked>
                    <span>כן</span>
                </label>
                <label class="inline-flex items-center gap-2 rounded-full border border-slate-700 px-4 py-2">
                    <input type="radio" name="compare_would_buy_again" value="false" class="text-primary">
                    <span>לא</span>
                </label>
            </div>
        </div>

        <div class="flex flex-col gap-3 md:flex-row md:items-center">
            <button type="submit" class="inline-flex items-center justify-center rounded-2xl bg-gradient-to-r from-primary to-secondary px-6 py-3 text-sm font-bold text-white transition hover:opacity-90">
                שמור/י תשובות מחקר
            </button>
            <p id="compareResearchMessage" class="hidden text-sm text-emerald-300"></p>
        </div>
    </form>
</section>
