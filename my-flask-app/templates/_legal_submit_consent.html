<div class="mt-4 space-y-2">
    <label class="flex items-start gap-2 text-slate-200 cursor-pointer">
        <input type="checkbox"
               id="{{ checkbox_id }}"
               class="mt-1 rounded border-slate-600 bg-slate-800 text-primary">
        <span>
            אני מאשר/ת שקראתי ואני מסכים/ה ל
            <a href="{{ url_for('public.terms') }}" target="_blank" rel="noopener noreferrer" class="underline text-primary">תנאי השימוש</a>
            ול
            <a href="{{ url_for('public.privacy') }}" target="_blank" rel="noopener noreferrer" class="underline text-primary">מדיניות הפרטיות</a>.
        </span>
    </label>
    <p id="{{ error_id }}" class="hidden text-xs text-danger">יש לסמן את תיבת האישור לפני המשך.</p>
</div>
